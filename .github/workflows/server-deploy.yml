name: server-deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "core/**"
      - "data/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - "build.gradle.kts"
      - ".github/workflows/server-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Test + build distribution
        run: ./gradlew :server:test :server:installDist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Gated: only deploys to real infra when explicitly enabled via a repo variable.
    if: ${{ github.ref == 'refs/heads/main' && vars.ZYNC_DEPLOY_ENABLED == 'true' }}
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC, no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Roll the server via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:app,Values=zync-server" \
            --comment "deploy ${{ github.sha }}" \
            --parameters commands='["/opt/zync/deploy.sh ghcr.io/${{ github.repository }}/server:${{ github.sha }}"]'
