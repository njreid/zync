name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to embed in the APK
        required: true
        default: "1.0"
      version_code:
        description: Monotonic Android versionCode
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  android-apk:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Decode release keystore
        env:
          ZYNC_RELEASE_KEYSTORE_BASE64: ${{ secrets.ZYNC_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$ZYNC_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$ZYNC_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/zync-release.jks"

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          if [ -n "$INPUT_VERSION_NAME" ]; then
            version_name="$INPUT_VERSION_NAME"
          else
            version_name="${RELEASE_TAG#v}"
          fi
          if [ -n "$INPUT_VERSION_CODE" ]; then
            version_code="$INPUT_VERSION_CODE"
          else
            version_code="$GITHUB_RUN_NUMBER"
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        env:
          ZYNC_KEYSTORE_FILE: ${{ runner.temp }}/zync-release.jks
          ZYNC_KEYSTORE_PASSWORD: ${{ secrets.ZYNC_KEYSTORE_PASSWORD }}
          ZYNC_KEY_ALIAS: ${{ secrets.ZYNC_KEY_ALIAS }}
          ZYNC_KEY_PASSWORD: ${{ secrets.ZYNC_KEY_PASSWORD }}
          ZYNC_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ZYNC_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "zync-${{ steps.version.outputs.version_name }}.apk"

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "zync-${{ steps.version.outputs.version_name }}.apk" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zync-android-apk
          path: zync-${{ steps.version.outputs.version_name }}.apk
