name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_name:
        description: Version name to embed in the APK
        required: true
        default: "1.0"
      version_code:
        description: Monotonic Android versionCode
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  android-apk:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Decode release keystore
        env:
          ZYNC_RELEASE_KEYSTORE_BASE64: ${{ secrets.ZYNC_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$ZYNC_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$ZYNC_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/zync-release.jks"

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          if [ -n "$INPUT_VERSION_NAME" ]; then
            version_name="$INPUT_VERSION_NAME"
          else
            version_name="${RELEASE_TAG#v}"
          fi
          if [ -n "$INPUT_VERSION_CODE" ]; then
            version_code="$INPUT_VERSION_CODE"
          else
            version_code="$GITHUB_RUN_NUMBER"
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        env:
          ZYNC_KEYSTORE_FILE: ${{ runner.temp }}/zync-release.jks
          ZYNC_KEYSTORE_PASSWORD: ${{ secrets.ZYNC_KEYSTORE_PASSWORD }}
          ZYNC_KEY_ALIAS: ${{ secrets.ZYNC_KEY_ALIAS }}
          ZYNC_KEY_PASSWORD: ${{ secrets.ZYNC_KEY_PASSWORD }}
          ZYNC_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ZYNC_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: $ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "zync-${{ steps.version.outputs.version_name }}.apk"

      - name: Attach APK to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "zync-${{ steps.version.outputs.version_name }}.apk" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zync-android-apk
          path: zync-${{ steps.version.outputs.version_name }}.apk

  desktop-macos:
    name: Build macOS desktop app
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x64
          - runner: macos-14
            arch: aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
        shell: bash
        run: |
          if [ -n "$INPUT_VERSION_NAME" ]; then
            version_name="$INPUT_VERSION_NAME"
          else
            version_name="${RELEASE_TAG#v}"
          fi
          if [[ "$version_name" =~ ^[0-9]+\.[0-9]+$ ]]; then
            package_version="$version_name.0"
          else
            package_version="$version_name"
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Stamp desktop package version
        working-directory: desktop
        env:
          ZYNC_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          npm version --no-git-tag-version --allow-same-version "$ZYNC_VERSION"
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.version=process.env.ZYNC_VERSION; fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');"

      - name: Build DMG
        working-directory: desktop
        run: npm run tauri build -- --bundles dmg

      - name: Rename DMG
        id: artifact
        shell: bash
        run: |
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)"
          test -n "$dmg"
          artifact="zync-${{ steps.version.outputs.version_name }}-macos-${{ matrix.arch }}.dmg"
          cp "$dmg" "$artifact"
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Attach DMG to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.artifact.outputs.path }}" --clobber

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zync-macos-${{ matrix.arch }}
          path: ${{ steps.artifact.outputs.path }}

  desktop-linux:
    name: Build Linux desktop app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
        run: |
          if [ -n "$INPUT_VERSION_NAME" ]; then
            version_name="$INPUT_VERSION_NAME"
          else
            version_name="${RELEASE_TAG#v}"
          fi
          if [[ "$version_name" =~ ^[0-9]+\.[0-9]+$ ]]; then
            package_version="$version_name.0"
          else
            package_version="$version_name"
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Install Linux bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Stamp desktop package version
        working-directory: desktop
        env:
          ZYNC_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          npm version --no-git-tag-version --allow-same-version "$ZYNC_VERSION"
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.version=process.env.ZYNC_VERSION; fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');"

      - name: Build Linux bundles
        working-directory: desktop
        run: npm run tauri build -- --bundles deb,appimage

      - name: Rename Linux artifacts
        id: artifact
        shell: bash
        run: |
          deb="$(find desktop/src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)"
          appimage="$(find desktop/src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)"
          test -n "$deb"
          test -n "$appimage"
          deb_artifact="zync-${{ steps.version.outputs.version_name }}-linux-x64.deb"
          appimage_artifact="zync-${{ steps.version.outputs.version_name }}-linux-x64.AppImage"
          cp "$deb" "$deb_artifact"
          cp "$appimage" "$appimage_artifact"
          echo "deb=$deb_artifact" >> "$GITHUB_OUTPUT"
          echo "appimage=$appimage_artifact" >> "$GITHUB_OUTPUT"

      - name: Attach Linux artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.artifact.outputs.deb }}" "${{ steps.artifact.outputs.appimage }}" --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zync-linux-x64
          path: |
            ${{ steps.artifact.outputs.deb }}
            ${{ steps.artifact.outputs.appimage }}

  desktop-windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
        shell: bash
        run: |
          if [ -n "$INPUT_VERSION_NAME" ]; then
            version_name="$INPUT_VERSION_NAME"
          else
            version_name="${RELEASE_TAG#v}"
          fi
          if [[ "$version_name" =~ ^[0-9]+\.[0-9]+$ ]]; then
            package_version="$version_name.0"
          else
            package_version="$version_name"
          fi
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Stamp desktop package version
        working-directory: desktop
        env:
          ZYNC_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          npm version --no-git-tag-version --allow-same-version "$ZYNC_VERSION"
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.version=process.env.ZYNC_VERSION; fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');"

      - name: Build Windows bundles
        working-directory: desktop
        run: npm run tauri build -- --bundles nsis,msi

      - name: Rename Windows artifacts
        id: artifact
        shell: bash
        run: |
          msi="$(find desktop/src-tauri/target/release/bundle/msi -name '*.msi' -print -quit)"
          nsis="$(find desktop/src-tauri/target/release/bundle/nsis -name '*.exe' -print -quit)"
          test -n "$msi"
          test -n "$nsis"
          msi_artifact="zync-${{ steps.version.outputs.version_name }}-windows-x64.msi"
          nsis_artifact="zync-${{ steps.version.outputs.version_name }}-windows-x64-setup.exe"
          cp "$msi" "$msi_artifact"
          cp "$nsis" "$nsis_artifact"
          echo "msi=$msi_artifact" >> "$GITHUB_OUTPUT"
          echo "nsis=$nsis_artifact" >> "$GITHUB_OUTPUT"

      - name: Attach Windows artifacts to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.artifact.outputs.msi }}" "${{ steps.artifact.outputs.nsis }}" --clobber

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zync-windows-x64
          path: |
            ${{ steps.artifact.outputs.msi }}
            ${{ steps.artifact.outputs.nsis }}
