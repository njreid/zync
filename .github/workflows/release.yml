name: Release APK

# Publishes a signed release APK to the GitHub Release when a `v*` tag is
# pushed (e.g. `git tag v1.2.0 && git push origin v1.2.0`).
#
# Required repository secrets:
#   ZYNC_KEYSTORE_BASE64   - base64 of your release keystore (.jks)
#                            `base64 -w0 zync-release.jks`
#   ZYNC_KEYSTORE_PASSWORD - keystore password
#   ZYNC_KEY_ALIAS         - key alias (e.g. zync)
#   ZYNC_KEY_PASSWORD      - key password
# The SAME keystore must be reused for every release, or updates won't install
# over an existing install.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to attach the APK to the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (compileSdk 37 + build-tools)
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Decode release keystore
        env:
          ZYNC_KEYSTORE_BASE64: ${{ secrets.ZYNC_KEYSTORE_BASE64 }}
        run: echo "$ZYNC_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/zync-release.jks"

      - name: Derive version name from tag
        id: ver
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          ZYNC_KEYSTORE_FILE: ${{ runner.temp }}/zync-release.jks
          ZYNC_KEYSTORE_PASSWORD: ${{ secrets.ZYNC_KEYSTORE_PASSWORD }}
          ZYNC_KEY_ALIAS: ${{ secrets.ZYNC_KEY_ALIAS }}
          ZYNC_KEY_PASSWORD: ${{ secrets.ZYNC_KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon assembleRelease \
            -PzyncVersionCode=${{ github.run_number }} \
            -PzyncVersionName=${{ steps.ver.outputs.name }}

      - name: Verify the APK is signed
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK=$APK" >> "$GITHUB_ENV"
          "$ANDROID_HOME"/build-tools/37.0.0/apksigner verify --verbose "$APK"

      - name: Attach APK to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK }}
          fail_on_unmatched_files: true
