name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit tests (JVM + Robolectric + KMP)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # `test` covers the JVM/Android modules (:app, :server); `allTests` covers the
      # KMP modules (:core, :data, :web → jvmTest + testAndroidHostTest). Plain
      # `test` alone would silently skip the KMP core conformance/convergence tests.
      - name: Run unit tests
        run: ./gradlew test allTests --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"
          if-no-files-found: ignore

  browser:
    name: Browser tests (Playwright vs :server:webDevServer)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webtest/package-lock.json

      - name: Install Playwright
        working-directory: webtest
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # playwright.config.js starts ./gradlew :server:webDevServer itself; CI=true
      # makes it refuse to reuse a stray server, so a broken launcher fails loudly.
      - name: Run browser tests
        working-directory: webtest
        run: npx playwright test

      - name: Upload traces
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: webtest/test-results/
          if-no-files-found: ignore
