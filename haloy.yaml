# haloy deploy config for the zync server. Replaces the Compose + Caddy + GHCR + SSM
# pipeline: `haloy deploy` builds the image locally (from server/Dockerfile), uploads only
# the changed layers, and does a zero-downtime swap with automatic TLS.
#
# litestream is NOT in the app container — it runs as a host sidecar
# (deploy/litestream.service) replicating the shared /opt/zync/data bind-mount, so the
# swap's brief old+new overlap never doubles up litestream (see deployment spec §10).
#
# Prereqs: haloyd running on `server`; DNS A record for `domain` → the box; the EC2
# instance role grants S3 (blobs) — no AWS keys needed in the container.
# Deploy:  haloy validate-config && haloy deploy
name: "zync-server"

# The haloyd host (edit to your server, or set via ~/.config/haloy/client.yaml).
server: "haloy.example.com"

domains:
  - domain: "zync.example.com"

port: "8080"
health_check_path: "/health"

# Host bind-mount shared with the litestream sidecar (single writer: the app; the
# sidecar only reads + replicates).
volumes:
  - "/opt/zync/data:/data"

image:
  build_config:
    dockerfile: "server/Dockerfile"
    context: "."
    platform: "linux/arm64"

env:
  - name: "ZYNC_DB_PATH"
    value: "/data/zync.db"
  - name: "ZYNC_PORT"
    value: "8080"
  - name: "AWS_REGION"
    from:
      env: "AWS_REGION"
  - name: "ZYNC_BLOB_BUCKET"
    from:
      env: "ZYNC_BLOB_BUCKET"
  - name: "ZYNC_SERVER_KEY_FILE"
    value: "/data/server-identity.key"
  - name: "ZYNC_PUBLIC_ADDR"
    from:
      env: "ZYNC_PUBLIC_ADDR"
  # External operations API: a dedicated bearer credential for trusted bots
  # such as Newz. Unset keeps POST /api/ops closed.
  - name: "ZYNC_BOT_TOKEN"
    from:
      env: "ZYNC_BOT_TOKEN"
  - name: "ZYNC_BOT_ID"
    value: "newz"
  # Browser passkey auth. Without RP_ID + ORIGIN the server REFUSES to start (fail
  # closed; ZYNC_ALLOW_UNAUTHENTICATED_WEB=true is the dev-only override). ORIGIN must
  # be the exact scheme+host; RP_ID the registrable domain.
  - name: "ZYNC_WEBAUTHN_RP_ID"
    from:
      env: "ZYNC_WEBAUTHN_RP_ID"
  - name: "ZYNC_WEBAUTHN_ORIGIN"
    from:
      env: "ZYNC_WEBAUTHN_ORIGIN"
  - name: "ZYNC_WEBAUTHN_REG_TOKEN"
    from:
      env: "ZYNC_WEBAUTHN_REG_TOKEN"
  # Agenda side channel: bearer token for POST /agenda/{source} (Apps Script pusher).
  # Unset = ingestion disabled.
  - name: "ZYNC_AGENDA_TOKEN"
    from:
      env: "ZYNC_AGENDA_TOKEN"
  # Newz handoff (zync→newz WebView SSO): the DEDICATED integration signing seed
  # (public key published to newz via deploy config) + the service credential newz
  # presents on its private redeem call. Either unset closes that half.
  - name: "ZYNC_NEWZ_SIGNING_SEED"
    from:
      env: "ZYNC_NEWZ_SIGNING_SEED"
  - name: "ZYNC_NEWZ_REDEEM_TOKEN"
    from:
      env: "ZYNC_NEWZ_REDEEM_TOKEN"
  # Optional separate public origin for Newz when it is host-routed rather than
  # mounted under the Zync hostname (for example https://newz.dev.choosh.ai).
  - name: "ZYNC_NEWZ_PUBLIC_ADDR"
    from:
      env: "ZYNC_NEWZ_PUBLIC_ADDR"

# Build the JVM distribution the Dockerfile packages, before haloy builds the image.
pre_deploy:
  - "./gradlew :server:installDist"
