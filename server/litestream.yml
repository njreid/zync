# litestream config for the host sidecar (deploy/litestream.service). Replicates the
# SQLite DB on the shared bind-mount to S3. Runs as a single long-lived host process —
# NOT inside the haloy-swapped app container — so a zero-downtime deploy never doubles up.
# Credentials come from the EC2 instance role (default provider chain).
dbs:
  - path: /opt/zync/data/zync.db
    replicas:
      - type: s3
        bucket: ${ZYNC_S3_BUCKET}
        path: litestream/zync.db
        region: ${AWS_REGION}
        retention: 168h          # keep 7 days of generations for rollback
        snapshot-interval: 1h
        validation-interval: 12h
