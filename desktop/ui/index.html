<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zync</title>
    <link rel="stylesheet" href="/vendor/pico.min.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <hgroup>
        <h1>zync</h1>
        <p id="status-line">Looking for your phone&hellip;</p>
      </hgroup>

      <section id="view-discover">
        <div id="discover-empty" hidden>
          <p>No zync phones found on this network yet.</p>
          <button id="rescan-button" type="button">Scan again</button>
        </div>
        <ul id="phone-list"></ul>
      </section>

      <section id="view-qr" hidden>
        <h2>Scan to pair</h2>
        <p>In the zync app: <strong>Pair a browser</strong>, then scan this code.</p>
        <img id="qr-image" alt="Pairing QR code" width="256" height="256" />
        <button id="cancel-pair-button" type="button" class="secondary">Cancel</button>
      </section>

      <section id="view-confirm" hidden>
        <h2>Confirm on your phone</h2>
        <p>Check that this code matches what's shown on your phone:</p>
        <p><strong id="confirm-code" class="confirm-code"></strong></p>
      </section>

      <section id="view-error" hidden>
        <h2>Pairing failed</h2>
        <p id="error-message"></p>
        <button id="retry-button" type="button">Try again</button>
      </section>

      <section id="view-connecting" hidden>
        <p aria-busy="true">Connecting&hellip;</p>
      </section>

      <footer id="footer-actions" hidden>
        <button id="forget-button" type="button" class="secondary outline">Forget device</button>
      </footer>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
